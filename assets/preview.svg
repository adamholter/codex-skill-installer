<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#FAFAF7"/>
  <rect x="48" y="44" width="1104" height="542" rx="24" stroke="#111111" stroke-width="4"/>
  <path d="M88 116C188 96 311 88 430 94" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
  <path d="M90 124C218 126 346 118 503 120" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <text x="88" y="94" fill="#111111" font-size="38" font-family="Comic Sans MS, Chalkboard, Marker Felt, cursive">Install Codex skills straight from GitHub</text>
  <text x="90" y="150" fill="#111111" font-size="24" font-family="Comic Sans MS, Chalkboard, Marker Felt, cursive">list - pick - install - done</text>

  <rect x="84" y="196" width="332" height="280" rx="18" stroke="#111111" stroke-width="4"/>
  <text x="106" y="232" fill="#111111" font-size="28" font-family="Comic Sans MS, Chalkboard, Marker Felt, cursive">1. See what's available</text>
  <text x="106" y="274" fill="#111111" font-size="19" font-family="Menlo, Monaco, monospace">$ python3 scripts/list-skills.py</text>
  <text x="106" y="322" fill="#111111" font-size="18" font-family="Menlo, Monaco, monospace">1. aspnet-core</text>
  <text x="106" y="350" fill="#111111" font-size="18" font-family="Menlo, Monaco, monospace">2. chatgpt-apps</text>
  <text x="106" y="378" fill="#111111" font-size="18" font-family="Menlo, Monaco, monospace">3. cli-creator</text>
  <text x="106" y="406" fill="#111111" font-size="18" font-family="Menlo, Monaco, monospace">4. figma</text>
  <text x="106" y="434" fill="#111111" font-size="18" font-family="Menlo, Monaco, monospace">...</text>

  <rect x="434" y="196" width="332" height="280" rx="18" stroke="#111111" stroke-width="4"/>
  <text x="456" y="232" fill="#111111" font-size="28" font-family="Comic Sans MS, Chalkboard, Marker Felt, cursive">2. Install from GitHub</text>
  <text x="456" y="274" fill="#111111" font-size="17" font-family="Menlo, Monaco, monospace">$ python3 scripts/install-skill-</text>
  <text x="456" y="299" fill="#111111" font-size="17" font-family="Menlo, Monaco, monospace">from-github.py --repo openai/skills</text>
  <text x="456" y="324" fill="#111111" font-size="17" font-family="Menlo, Monaco, monospace">--path skills/.curated/aspnet-core</text>
  <text x="456" y="370" fill="#111111" font-size="18" font-family="Menlo, Monaco, monospace">download archive first</text>
  <text x="456" y="398" fill="#111111" font-size="18" font-family="Menlo, Monaco, monospace">fall back to sparse checkout</text>
  <text x="456" y="426" fill="#111111" font-size="18" font-family="Menlo, Monaco, monospace">works with repo paths or URLs</text>

  <rect x="784" y="196" width="332" height="280" rx="18" stroke="#111111" stroke-width="4"/>
  <text x="806" y="232" fill="#111111" font-size="28" font-family="Comic Sans MS, Chalkboard, Marker Felt, cursive">3. Skill lands locally</text>
  <text x="806" y="274" fill="#111111" font-size="17" font-family="Menlo, Monaco, monospace">Installed aspnet-core to</text>
  <text x="806" y="299" fill="#111111" font-size="17" font-family="Menlo, Monaco, monospace">~/.codex/skills/aspnet-core</text>
  <path d="M824 346C846 330 876 326 906 332" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
  <path d="M824 348C850 374 886 392 932 396" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
  <text x="806" y="428" fill="#111111" font-size="19" font-family="Comic Sans MS, Chalkboard, Marker Felt, cursive">No manual repo surgery</text>
  <text x="806" y="454" fill="#111111" font-size="19" font-family="Comic Sans MS, Chalkboard, Marker Felt, cursive">No copy-paste folder mistakes</text>

  <path d="M418 338C430 338 436 338 448 338" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
  <path d="M744 338C756 338 762 338 774 338" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
  <path d="M438 328L456 338L438 348" stroke="#111111" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M764 328L782 338L764 348" stroke="#111111" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="92" y="536" fill="#111111" font-size="22" font-family="Comic Sans MS, Chalkboard, Marker Felt, cursive">Built from Adam's working Codex skill. Cleaned for public sharing.</text>
</svg>
